services:
  portfolio:
    build:
      context: .
      dockerfile: frontend/portfolio/Dockerfile
    ports:
      - "5173:5173"
    environment:
      PORT: "5173"
      BASE_PATH: "/"
    env_file:
      - path: .env
        required: false

  admin:
    build:
      context: .
      dockerfile: frontend/admin/Dockerfile
    ports:
      - "5174:5174"
    environment:
      PORT: "5174"
      BASE_PATH: "/admin/"
    env_file:
      - path: .env
        required: false

  backend:
    build:
      context: .
      dockerfile: backend/api-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "development"
    env_file:
      - path: .env
        required: false
    depends_on:
      - portfolio
